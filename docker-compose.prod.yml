services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.prod.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DEFAULT_PLAYER_NAME: ${DEFAULT_PLAYER_NAME}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_PLAYER_EMAIL: ${DEFAULT_PLAYER_EMAIL}
      DEFAULT_PLAYER_PASSWORD: ${DEFAULT_PLAYER_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT}

  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres_data_prod:
